<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6Z5WR106YH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6Z5WR106YH');
    </script>
    <meta name="google-site-verification" content="HmcKjUyHIMvD8RCWr3dxIAojKqcx5ykNgl19R19-ZQA" />
    <link rel="canonical" href="https://otaku-save-terra.github.io/anime-watch-order/browse/index.html" />
    <title>Anime Watch Order - Browse</title>
    <meta name="description" content="Complete anime watch order guide. Discover chronological order, release order, and recommended viewing order for popular anime series and movies.">
    <link rel="icon" href="../assets/images/v1.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <div class="logo">
                    <a href="../home/index.html"><img src="../assets/images/title.png" alt="AniWatch Order" class="logo__img"></a>
                </div>

                <nav class="nav">
                </nav>

                <div class="header__actions">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search anime...">
                        <button id="searchButton" class="search-button">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <div id="searchSuggestions" class="search-suggestions hidden"></div>
                    </div>

                    <button id="themeToggle" class="theme-toggle">
                        <i class="theme-icon theme-icon--light fa-solid fa-sun" aria-hidden="true"></i>
                        <i class="theme-icon theme-icon--dark fa-solid fa-moon hidden" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <br>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Browse Page -->
            <section id="browsePage" class="page active">
                <div class="browse-page">
                    <div class="page-header">
                        <h2 id="browseHeader">Browse Anime</h2>
                        <p id="browseSubtitle">Explore all available anime watch orders</p>
                    </div>
                    <div class="browse-grid-wrapper">
                        <div id="browseGrid" class="anime-grid">
                            <!-- Cards rendered by browse.js -->
                        </div>
                        <div id="browsePagination" class="browse-pagination">
                            <!-- Pagination rendered by browse.js -->
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Anime Detail Modal -->
    <div id="animeModal" class="modal hidden">
        <div class="modal__backdrop"></div>
        <div class="modal__content">
            <button class="modal__close" id="closeModal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal__body">
                <div id="animeDetails">
                    <!-- Anime details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
    </footer>

    <script src="../shared.js"></script>
    <script src="../home/home.js"></script>
    <script src="browse.js"></script>
</body>
</html>
