<head>

    <link rel="canonical" href="https://otaku-save-terra.github.io/anime-watch-order/" />
    <title>Anime Watch Order</title>
    <meta name="description" content="Complete anime watch order guide. Discover chronological order, release order, and recommended viewing order for popular anime series and movies.">
    <!-- Open Graph -->
    <meta property="og:title" content="Anime Watch Order">
    <meta property="og:description" content="Complete anime watch order guide. Discover chronological order, release order, and recommended viewing order for popular anime series and movies.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://otaku-save-terra.github.io/anime-watch-order/">
    <meta property="og:site_name" content="AniWatch Order">
    <meta property="og:image" content="https://otaku-save-terra.github.io/anime-watch-order/assets/images/v3.png">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Anime Watch Order">
    <meta name="twitter:description" content="Complete anime watch order guide. Discover chronological order, release order, and recommended viewing order for popular anime series and movies.">
    <meta name="twitter:image" content="https://otaku-save-terra.github.io/anime-watch-order/assets/images/v3.png">
    <link rel="icon" href="../assets/images/v1.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <div class="logo">
                    <a href="../home/"><img src="../assets/images/title.png" alt="AniWatch Order" class="logo__img"></a>
                </div>

                <nav class="nav">
                </nav>

                <div class="header__actions">
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search anime...">
                        <button id="searchButton" class="search-button">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <div id="searchSuggestions" class="search-suggestions hidden"></div>
                    </div>

                    <button id="themeToggle" class="theme-toggle">
                        <i class="theme-icon theme-icon--light fa-solid fa-sun" aria-hidden="true"></i>
                        <i class="theme-icon theme-icon--dark fa-solid fa-moon hidden" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <br>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Home Page -->
            <section id="homePage" class="page active">

                <div class="hero">
                    <div class="hero__content">
                        <h1 class="hero__title">Discover Anime Watch Order</h1>
                        <p class="hero__subtitle">The only ads free site you need to find an anime watch order </p>
                        <div class="hero__actions">
                            <button id="startExploringBtn" class="btn btn--primary">Start Exploring</button>
                        </div>
                    </div>

                    <div id="featuredCarousel" class="hero__carousel">
                    </div>
                </div>

                <section id="continueWatchingSection" class="section hidden">
                    <div class="section__header">
                        <h2>Continue Watching</h2>
                    </div>
                    <div id="continueWatchingGrid" class="anime-grid anime-grid--horizontal">
                    </div>
                </section>

                <section id="recentUpdateSection" class="section">
                    <div class="section__header">
                        <h2>Recently Updated</h2>
                        <a class="btn btn--secondary btn--sm" href="../browse/">View All</a>
                    </div>
                    <div id="recentlyUpdatedGrid" class="anime-grid anime-grid--horizontal" data-home-catalog="true">
                    </div>
                </section>

                <div class="hero">
                    <div class="hero__content">
                        <h2 class="hero__title">Want to share your watch order?</h2>
                        <p class="hero__subtitle">You can add your watch order and contribute to this site!</p>
                        <div class="hero__actions">
                            <a class="btn btn--secondary" href="https://github.com/Otaku-Save-Terra/anime-watch-order/wiki" target="_blank">Learn More</a>
                        </div>
                    </div>
                </div>

            </section>

        </div>
    </main>

    <!-- Anime Detail Modal -->
    <div id="animeModal" class="modal hidden">
        <div class="modal__backdrop"></div>
        <div class="modal__content">
            <button class="modal__close" id="closeModal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal__body">
                <div id="animeDetails">
                    <!-- Anime details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
    </footer>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "AniWatch Order",
        "url": "https://otaku-save-terra.github.io/anime-watch-order/",
        "description": "Complete anime watch order guide. Discover chronological order, release order, and recommended viewing order for popular anime series and movies."
    }
    </script>
    <script src="../shared.js"></script>
    <script src="home.js"></script>
</body>
</html>
